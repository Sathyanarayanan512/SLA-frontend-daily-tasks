<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JavaScript Basics Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    pre {
      background: #f4f4f4;
      padding: 10px;
      border-radius: 5px;
      font-size: 20px;
    }
    #form{
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: black;
    color: white;
    font-size: 20px;
    padding: 15px;
    margin: 10px 200px;
    border-radius: 10%;
}
label{
    border-radius: 8px;
    padding: 5px;
    margin: 10px;
}
input[type="text"], input[type="number"]{
    border-radius: 8px;
    font-weight: bold;
    font-size: 20px;
    padding: 5px;
    margin: 10px;
}
button{
    background-color: black;
    color: white;
    font-size: 15px;
    padding: 10px;
    border-radius: 10%;
    border: 2px solid white;
}
#displayarea{
    padding: 20px;
    border: 3px solid black;
    border-radius: 10%;
    text-align: center;
    font-weight: bold;
    font-size: 20px;
    margin: 5px 600px;
}
  </style>
</head>
<body>
    <div id="form">
        <label for="name">Name: </label>
        <input type="text" id="name">
        <label for="age">Age: </label>
        <input type="number" id="age">
        <button onclick="checkVotingAbility()" type="button">Check Voting Ability</button>
    </div>
        <div id="displayarea"></div>

  <h2>JavaScript Variables & Operators Demo</h2>
  <pre id="output"></pre>

  <script>
    function checkVotingAbility(){
                let age=document.getElementById('age').value;
                if(age>=18){
                    document.getElementById('displayarea').textContent="You can Vote!";
                }
                else{
                    document.getElementById('displayarea').textContent="You can't Vote!";
                }
            }

    let name = "Sathyanarayanan";
    let age = 23;
    const isEmployed = true;

    let str = "Hello";
    let num = 20;
    let bool = false;
    let emptyValue = null;
    let notAssigned; 

    let addition = num + 5;
    let subtraction = num - 5;
    let multiplication = num * 2;
    let division = num / 2;
    let modulus = num % 3;

    let Equal = (num == "20");   
    let strictEqual = (num === "20");  

    let andOp = (age > 18 && isEmployed); 
    let orOp = (age < 18 || isEmployed);   

    let output = `
Name: ${name}
Age: ${age}
Is Employed: ${isEmployed}

String: ${str}
Number: ${num}
Boolean: ${bool}
Null: ${emptyValue}
Undefined: ${notAssigned}

Addition: ${addition}
Subtraction: ${subtraction}
Multiplication: ${multiplication}
Division: ${division}
Modulus: ${modulus}

Equality: ${Equal}
Strict Equality: ${strictEqual}

AND: ${andOp}
OR: ${orOp}
    `;

    document.getElementById("output").textContent = output;
  </script>

</body>
</html>
