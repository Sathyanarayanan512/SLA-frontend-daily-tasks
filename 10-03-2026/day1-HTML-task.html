<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day-1 task</title>
</head>
<style>
    .container1{
        border:2px solid black;
    }
    #section1{
        border:4px solid black;
    }
</style>
<body>
    <h1>Day-1 task</h1>
    <!-- Creating a simple HTML page-->
    <img src="https://picsum.photos/200" alt="random image" width="300" height="300">
    <p>This is a paragraph</p>
    <b>This is bold</b>
    <i>This is italic</i>
    <u>This is underlined</u>
    <br><br>
    <!-- Practising grouping content -->
    <div class="container1">
        <h2>This is heading 2</h2>
        <p>This is a paragraph</p>
    </div>
    <section id="section1">
        <h2>Section's Heading</h2>
        <p>This is a description of the section</p>
    </section>
</body>
</html>
